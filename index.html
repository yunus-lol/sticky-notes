<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="styles.css">
  <title>Sticky Notes</title>
</head>
<body>
  <button class="add-sticky-note">Add Sticky Note</button>
  <div class="notes-container"></div>

  <dialog class="add-note-modal">
    <div class="modal-content">
      <img src="cross.png" class="close-modal">
    </div>
    <form>
      <input type="text" class="title" name="title" placeholder="Title...">
      <textarea class="description" name="description" placeholder="Type to text..." rows="12" cols="50" ></textarea>
      <button class="submit">Save Sticky Note</button>
    </form>
  </dialog>
  <script src="script.js"></script>
</body>
</html>
